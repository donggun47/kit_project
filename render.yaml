services:
  - type: web
    name: smma-intelligence-hub
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false # User must set this in Render dashboard
      - key: PYTHON_VERSION
        value: 3.10.0
